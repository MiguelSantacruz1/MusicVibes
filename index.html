<!DOCTYPE html>

<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MusicVibes</title>

  <link rel="stylesheet" href="/src/theme.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

</head>

<body>



  <!-- Canvas de partículas de fondo -->

  <canvas id="bg-canvas"></canvas>

  <div class="glow glow-1"></div>

  <div class="glow glow-2"></div>

  <div class="glow glow-3"></div>



  <!-- ====================== MODAL ========================= -->

  <div class="modal-bg" id="modal-bg">

    <div class="modal">

      <div class="modal-top">

        <span class="modal-title">Añadir pista</span>

        <button class="modal-close" onclick="closeModal()">✕</button>

      </div>

      <div class="field">

        <label>ARCHIVO DE AUDIO</label>

        <div style="display:flex; gap:8px;">

          <input id="f-file" type="file" accept="audio/*" style="flex:1" onchange="autoDetectMeta(this)" />

        </div>

      </div>

      <div class="field"><label>TÍTULO *</label><input id="f-title" type="text" placeholder="Nombre de la pista" />
      </div>

      <div class="field"><label>ARTISTA *</label><input id="f-artist" type="text" placeholder="Nombre del artista" />
      </div>

      <div class="field"><label>DURACIÓN</label><input id="f-duration" type="text" placeholder="3:45" /></div>

      <div class="field">

        <label>INSERTAR EN</label>

        <select id="f-position" onchange="togglePosInput()">

          <option value="end">Final de la lista</option>

          <option value="start">Inicio de la lista</option>

          <option value="at">Posición específica</option>

        </select>

      </div>

      <div class="field" id="position-wrap">

        <label>POSICIÓN (0 = inicio)</label>

        <input id="f-pos-val" type="number" value="0" min="0" />

      </div>

      <div class="modal-actions">

        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>

        <button class="btn-confirm" onclick="submitTrack()">+ Añadir</button>

      </div>

    </div>

  </div>



  <!-- ======================= APP ========================== -->

  <div class="app">



    <!-- ── CONTENIDO PRINCIPAL: Biblioteca ──────────────── -->

    <main class="main">



      <!-- Ondas SVG de fondo -->

      <div class="wave-bg">

        <svg viewBox="0 0 600 640" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

          <defs>

            <radialGradient id="wg1" cx="50%" cy="50%" r="50%">

              <stop offset="0%" stop-color="rgba(20,200,220,0.04)" />

              <stop offset="100%" stop-color="rgba(20,200,220,0)" />

            </radialGradient>

          </defs>

          <ellipse cx="300" cy="320" rx="280" ry="250" fill="url(#wg1)">

            <animate attributeName="rx" values="280;320;280" dur="4s" repeatCount="indefinite" />

            <animate attributeName="ry" values="250;290;250" dur="4s" repeatCount="indefinite" />

            <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite" />

          </ellipse>

          <ellipse cx="300" cy="320" rx="200" ry="180" fill="none" stroke="rgba(20,200,220,0.06)" stroke-width="1">

            <animate attributeName="rx" values="200;250;200" dur="5s" repeatCount="indefinite" />

            <animate attributeName="ry" values="180;220;180" dur="5s" repeatCount="indefinite" />

          </ellipse>

        </svg>

      </div>



      <!-- Cabecera superior -->

      <div class="main-header">

        <div class="logo">

          <div class="logo-gem">💿</div>

          <span class="logo-name">MusicVibes</span>

          <div class="logo-gem">💿</div>

        </div>

        <div style="display:flex; gap:10px; align-items:center;">

          <input type="search" id="search-input" class="search-bar" placeholder="Buscar pista..."
            oninput="onQueryInput(event)" />

          <button class="btn-add" onclick="openModal()">

            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>

            Añadir

          </button>

        </div>

      </div>



      <!-- Visualizador de espectro -->
      <div class="freq-visualizer">
        <canvas id="freq-canvas"></canvas>
      </div>

      <div class="view-tabs">
        <button id="tab-local" class="tab-btn active" onclick="switchTab('local')">Mi Biblioteca</button>
        <button id="tab-deezer" class="tab-btn" onclick="switchTab('deezer')">Resultados Deezer</button>
      </div>

      <div class="col-headers" id="col-headers">
        <span style="text-align:center"></span>
        <span></span>
        <span style="text-align:right"></span>
        <span></span>
      </div>

      <div id="view-local">
        <div class="song-list" id="song-list"></div>
      </div>

      <div id="view-deezer" style="display:none;">
        <div class="song-list" id="deezer-list"></div>
      </div>






    </main>



    <!-- ── BARRA DEL REPRODUCTOR (inferior) ──────────────── -->

    <div class="player-bar">



      <!-- Izquierda: Reproduciendo ahora -->

      <div class="player-left">

        <div style="position:relative; flex-shrink:0;">

          <div class="vinyl-aura"></div>

          <div class="vinyl" id="vinyl">
            <div class="groove"></div>
            <div class="groove"></div>
            <div class="groove"></div>
            <div class="groove"></div>
            <div class="vinyl-dot"></div>
            <img id="vinyl-cover" src="" style="display:none; position:absolute; width:100%; height:100%; border-radius:50%; object-fit:cover; z-index:1; opacity:0.85;" />
            <div class="vinyl-center"></div>
          </div>

        </div>

        <div class="np-info">

          <span class="np-badge">

            <span class="np-badge-dot"></span>

            REPRODUCIENDO

          </span>

          <p class="np-title" id="np-title">Sin pista</p>

          <p class="np-artist" id="np-artist">—</p>

        </div>

      </div>



      <!-- Centro: Controles + Progreso -->

      <div class="player-center">

        <div class="controls">

          <button class="ctrl" id="btn-shuffle" onclick="toggleShuffle()" title="Aleatorio">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z" />
            </svg>

          </button>

          <button class="ctrl" onclick="prevTrack()" title="Anterior">

            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
            </svg>

          </button>

          <button class="ctrl ctrl-seek" onclick="skipBack(10)" title="Retroceder 10s">

            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" />
            </svg>

            <span class="seek-label">10</span>

          </button>

          <button class="ctrl-play" id="btn-play" onclick="togglePlay()">

            <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="white">
              <path d="M8 5v14l11-7z" />
            </svg>

            <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="white" style="display:none">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>

          </button>

          <button class="ctrl ctrl-seek" onclick="skipAhead(10)" title="Adelantar 10s">

            <span class="seek-label">10</span>

            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z" />
            </svg>

          </button>

          <button class="ctrl" onclick="nextTrack()" title="Siguiente">

            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z" />
            </svg>

          </button>

          <button class="ctrl" id="btn-loop" onclick="toggleLoop()" title="Bucle">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
            </svg>

          </button>

        </div>

        <div class="progress-wrap">

          <span id="time-current">0:00</span>

          <div class="progress-track" id="progress-track" onclick="seekClick(event)" style="cursor:pointer;">

            <div class="progress-fill" id="progress-fill"></div>

          </div>

          <span id="time-total">3:30</span>

        </div>

      </div>



      <!-- Derecha: Volumen + Visualizador -->

      <div class="player-right">

        <div class="viz-container">

          <canvas id="viz-canvas"></canvas>

        </div>

        <div class="vol-row">

          <button class="vol-icon-btn" id="vol-icon" onclick="muteToggle()" title="Silencio"></button>

          <input class="vol-slider" id="vol-slider" type="range" min="0" max="100" value="70" step="1" style="--val:70%"
            oninput="setGain(this.value)" />

          <span class="vol-value-badge" id="vol-label">70</span>

        </div>

      </div>



    </div><!-- /player-bar -->

  </div><!-- /app -->



  <script type="module" src="/src/app.ts"></script>

</body>

</html>
